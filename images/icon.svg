<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="64" x2="256" y2="64" stroke="#1a1a3e" stroke-width="0.5"/>
  <line x1="0" y1="128" x2="256" y2="128" stroke="#1a1a3e" stroke-width="0.5"/>
  <line x1="0" y1="192" x2="256" y2="192" stroke="#1a1a3e" stroke-width="0.5"/>

  <!-- Code lines (dimmed) -->
  <rect x="40" y="52" width="90" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>
  <rect x="40" y="62" width="60" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>

  <!-- HIGHLIGHTED LINE - the star -->
  <rect x="20" y="82" width="216" height="28" rx="4" fill="#ff2d95" opacity="0.85" filter="url(#glow-strong)"/>
  <rect x="40" y="91" width="120" height="5" rx="2" fill="#fff" opacity="0.95"/>
  <rect x="168" y="91" width="40" height="5" rx="2" fill="#fff" opacity="0.7"/>

  <!-- More code lines -->
  <rect x="40" y="124" width="100" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>
  <rect x="40" y="134" width="70" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>

  <!-- Another highlighted line (different color) -->
  <rect x="20" y="150" width="216" height="28" rx="4" fill="#00cc44" opacity="0.7" filter="url(#glow)"/>
  <rect x="40" y="159" width="80" height="5" rx="2" fill="#000" opacity="0.8"/>
  <rect x="128" y="159" width="55" height="5" rx="2" fill="#000" opacity="0.6"/>

  <!-- More lines -->
  <rect x="40" y="192" width="110" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>
  <rect x="40" y="202" width="50" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>

  <!-- Neon accent line at bottom -->
  <rect x="40" y="228" width="176" height="2" rx="1" fill="#3DD8FF" opacity="0.5" filter="url(#glow)"/>
</svg>
